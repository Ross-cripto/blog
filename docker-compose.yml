services:
  blog:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blog
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    # Monta content/ para publicar posts sin reconstruir la imagen
    volumes:
      - ./content:/app/content:ro
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://blog:3000/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
